# 監視対象と「激安」判定ルールの設定ファイル。
# 環境変数(.env)にはAPIキーなど秘匿情報のみを置き、こちらは監視条件の調整用。

rakuten:
  enabled: true
  poll_interval_minutes: 15
  # キーワード検索で監視するクエリ一覧
  keywords:
    - "SSD"
    - "モバイルバッテリー"
  # ジャンルランキングで監視するジャンルID(0=総合)
  ranking_genre_ids:
    - 0
    - 551177 # メンズファッション
    - 100433 # インナー・下着・ナイトウェア
    - 216131 # バッグ・小物・ブランド雑貨
    - 558885 # 靴
    - 101070 # スポーツ・アウトドア
    - 562637 # 家電
    - 211742 # TV・オーディオ・カメラ
    - 100026 # パソコン・周辺機器
    - 564500 # スマートフォン・タブレット
    - 100227 # 食品
    - 551167 # スイーツ・お菓子
    - 100316 # 水・ソフトドリンク
    - 100804 # インテリア・寝具・収納
    - 215783 # 日用品雑貨・文房具・手芸
    - 558944 # キッチン用品・食器・調理器具
    - 503190 # 車用品・バイク用品
    - 100939 # 美容・コスメ・香水
    - 100938 # ダイエット・健康
    - 551169 # 医薬品・コンタクト・介護
    - 100005 # 花・ガーデン・DIY
  hits_per_query: 30

amazon:
  # 有効化済み。ただし認証情報(.env の AMAZON_*)を設定するまでは自動的にスキップされる
  enabled: true
  poll_interval_minutes: 30
  # 検索キーワード一覧(仮。本格運用前に監視したい商品ジャンルのキーワードに差し替える)
  keywords:
    - "Echo Dot"
  item_count: 10
  # Amazon専用の判定ルール。ここで指定した項目だけ下の共通rulesを上書きする
  rules:
    # 定価に対する割引率がこれ以上なら「激安」判定
    min_discount_percent: 40
    # 過去90日の最安値以下(0%以上値下がり=最安値以下)なら「激安」判定
    price_drop_from_history_percent: 0
    price_history_window_days: 90
    # この価格帯の商品のみ通知対象にする
    price_min: 500
    price_max: 50000

rules:
  # 楽天向けの共通ルール(Amazonはamazon.rulesで上書きされる)
  # 定価/参考価格に対する割引率がこれ以上なら「激安」判定(Amazonのように定価情報がある場合)
  min_discount_percent: 50
  # これまでに観測した最安値からさらにこの割合以上下がったら「激安」判定
  price_drop_from_history_percent: 30
  # タイトルキーワードでの判定は廃止(誇大表現に反応してしまうため)。値下がり実績のみで判定する
  sale_keywords: []
  # 同一商品を再通知するまでのクールダウン時間
  renotify_cooldown_hours: 24

discord:
  # 該当ロールにメンションしたい場合はロールIDを設定(不要ならnullのまま)
  mention_role_id: null
